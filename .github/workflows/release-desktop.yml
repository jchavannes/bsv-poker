# Build the Windows desktop installers (Tauri MSI + NSIS) on a Windows runner and attach them to
# the GitHub Release for the pushed tag (app §A14, REQ-VM-004). Reproducible from CI, not just a
# local machine. Code signing is a later step (the installers are currently unsigned).
name: Release desktop installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install workspace + build the web frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @bsv-poker/client-web build

      - name: Build the Tauri installers
        working-directory: apps/client-desktop
        run: |
          npm install
          npx tauri build

      - name: Attach installers to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/client-desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/client-desktop/src-tauri/target/release/bundle/nsis/*-setup.exe

      - name: Upload installers as workflow artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            apps/client-desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/client-desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
