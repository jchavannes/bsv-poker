# Build the pure-.NET native Windows app (single-file, self-contained WPF poker.exe — no separate DLLs, no runtime
# prerequisite) on a Windows runner, build the INSTALLER (Inno Setup) and the portable ZIP, and attach all three to
# the GitHub Release for the pushed tag. Reproducible from CI. Code signing is a later step (currently unsigned).
name: Release desktop app

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-native:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build + test the solution
        run: |
          dotnet build dotnet/BsvPoker.sln -c Release
          dotnet run --project dotnet/test/BsvPoker.Tests/BsvPoker.Tests.csproj -c Release --no-build

      - name: Publish the single-file self-contained poker.exe + portable ZIP
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File installer/package.ps1
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "dotnet/src/BsvPoker.App/bin/Release/net8.0-windows/win-x64/publish/poker.exe" dist/poker.exe -Force

      - name: Build the installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer/BsvPoker.iss

      - name: Collect release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item dist/poker.exe out/ -Force
          Copy-Item release/*.zip out/ -Force
          Copy-Item installer/Output/*.exe out/ -Force

      - name: Attach artifacts to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/poker.exe
            out/*.zip
            out/BSV-Poker-Setup-*.exe

      - name: Upload artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: bsv-poker-windows-x64
          path: out/*
