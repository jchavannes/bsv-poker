# Build the pure-.NET native Windows app (single-file, self-contained WPF poker.exe — no installer, no
# separate DLLs, no runtime prerequisite) on a Windows runner and attach it to the GitHub Release for the
# pushed tag. Reproducible from CI. Code signing is a later step (currently unsigned).
name: Release desktop app

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-native:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build + test the solution
        run: |
          dotnet build dotnet/BsvPoker.sln -c Release
          dotnet run --project dotnet/test/BsvPoker.Tests/BsvPoker.Tests.csproj -c Release --no-build

      - name: Publish the single-file self-contained poker.exe
        shell: pwsh
        run: |
          dotnet publish dotnet/src/BsvPoker.App/BsvPoker.App.csproj -c Release -r win-x64 `
            --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true `
            -o dist
          Remove-Item dist/*.pdb -ErrorAction SilentlyContinue

      - name: Attach poker.exe to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/poker.exe

      - name: Upload poker.exe as a workflow artifact (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: poker-windows-x64
          path: dist/poker.exe
