# Self-contained runtime ("the VM", core §10 / D5, REQ-VM-001/002/003). A reproducible stack that
# launches node(regtest) + the player's own LOCAL NODE + client with NO external services and NO
# central server. bsv-poker is fully PEER-TO-PEER: there is no relay and no indexer. Each player runs
# their OWN local node (a P2PTransport peer that bridges the browser to the mesh); the nodes connect to
# EACH OTHER over the mesh. This single-machine compose runs ONE local node (one peer) for a local
# demo; for real multiplayer each player runs their own local node and dials a peer (--peer host:port).
# Regtest by default (REQ-VM-007); mainnet only behind an explicit research flag.
#
# Bring up: `docker compose -f vm/docker-compose.yml up` then open the client.
# One-command bootstrap + self-test: `node tools/selftest.ts` (runnable without Docker too).
services:
  node-regtest:
    # The embedded BSV node from bonded-subsat-channel (D6) is the local chain backend — the ONLY
    # infrastructure in a peer-to-peer system (the decentralized chain).
    image: bsv-poker/node-regtest:dev
    build:
      context: ..
      dockerfile: vm/Dockerfile.node
    environment:
      - BSV_NETWORK=regtest
    ports:
      - '127.0.0.1:18332:18332'
    healthcheck:
      test: ['CMD', 'true']
      interval: 5s

  local-node:
    # The player's OWN node: a P2P peer that exposes the browser's HTTP/SSE transport on loopback.
    # NOT a central relay — one per player. Other players' nodes are joined with `--peer host:port`.
    image: bsv-poker/local-node:dev
    build:
      context: ..
      dockerfile: vm/Dockerfile.localnode
    ports:
      - '127.0.0.1:8090:8090'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8090/healthz']
      interval: 5s
    depends_on:
      - node-regtest

  client:
    # The web client (framework-free vanilla DOM, in-tree build — no Vite) served locally; it talks
    # ONLY to the player's own local-node (loopback). The real image is apps/client-web/Dockerfile
    # (this is the placeholder).
    image: bsv-poker/client:dev
    build:
      context: ..
      dockerfile: vm/Dockerfile.client
    ports:
      - '127.0.0.1:8080:8080'
    depends_on:
      - local-node
